<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Наш сайтик{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main') }}">Наш Сайтик</a>
            <div class="navbar-nav ms-auto">
                {% if loggedIn or session.username %}
                <a class="nav-link" href="{{ url_for('chatroom') }}">Чат</a>
                <a class="nav-link" href="{{ url_for('displaynews') }}">Новости</a>
                {% endif %}
                {% if session.username %}
                <span class="navbar-text me-3">👋 {{ logged or session.username or 'Гость' }}</span>
                <a class="nav-link btn btn-outline-light" href="{{ url_for('logout') }}">Выйти</a>
                {% else %}
                <a class="nav-link" href="{{ url_for('login') }}">Вход</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
